# iOS/Swift Stack Reference

name: iOS
detect:
  files: ["Package.swift", "*.xcodeproj", "*.xcworkspace", "Podfile"]
  patterns: ["SwiftUI", "UIKit", "import Foundation"]

scan_paths:
  views:
    paths: ["*/Views/", "*/Screens/", "*/UI/"]
    patterns: ["*.swift"]
    markers: ["View", "struct.*View", "@main"]

  viewmodels:
    paths: ["*/ViewModels/", "*/Presenters/"]
    patterns: ["*.swift"]
    markers: ["@Observable", "ObservableObject", "ViewModel"]

  models:
    paths: ["*/Models/", "*/Entities/"]
    patterns: ["*.swift"]
    markers: ["struct", "class", "Codable"]

  services:
    paths: ["*/Services/", "*/Networking/", "*/API/"]
    patterns: ["*.swift"]
    markers: ["func", "async", "URLSession"]

  repositories:
    paths: ["*/Repositories/", "*/Data/"]
    patterns: ["*.swift"]

  extensions:
    paths: ["*/Extensions/", "*/Utilities/"]
    patterns: ["*.swift"]
    markers: ["extension"]

  tests:
    paths: ["*Tests/", "*UITests/"]
    patterns: ["*.swift"]
    markers: ["XCTestCase", "func test"]

grouping_hints:
  auth: ["login", "auth", "signin", "session"]
  navigation: ["navigation", "router", "coordinator"]
  data: ["repository", "service", "api"]

test_command: "xcodebuild test -scheme App -destination 'platform=iOS Simulator,name=iPhone 15'"
build_command: "xcodebuild build -scheme App -configuration Release"
